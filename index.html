<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>힐링 독서 기록장 🌿</title>
  <style>
    :root {
      --bg-cream: #fbf9f1;
      --forest-dark: #2c4a3e;
      --forest-light: #4a7c59;
      --mint: #a3b899;
      --soft-clay: #e07a5f;
      --text-dark: #2b2d42;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: var(--bg-cream); color: var(--text-dark); padding: 20px; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; }

    /* 헤더 및 통계 */
    header { text-align: center; margin-bottom: 30px; padding: 20px; background: #fff; border-radius: 15px; border: 2px solid var(--mint); }
    h1 { color: var(--forest-dark); margin-bottom: 15px; font-size: 24px; }
    
    .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .stat-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--mint); text-align: center; cursor: pointer; transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-3px); background-color: #f4f7f4; }
    .stat-card h3 { font-size: 13px; color: var(--forest-light); }
    .stat-card p { font-size: 20px; font-weight: bold; color: var(--forest-dark); }

    /* 목표 및 게이지 영역 */
    .progress-area { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--mint); margin-bottom: 25px; cursor: pointer; transition: background 0.2s; }
    .progress-area:hover { background-color: #fcfdfb; }
    .progress-bar { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 8px; }
    .progress-fill { background: var(--forest-light); height: 100%; width: 0%; transition: width 0.5s; }

    /* 탭 메뉴 */
    .tab-nav { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn { background: #fff; border: 1px solid var(--mint); padding: 10px 15px; border-radius: 20px; cursor: pointer; color: var(--forest-light); font-weight: bold; white-space: nowrap; }
    .tab-btn.active { background: var(--forest-dark); color: #fff; border-color: var(--forest-dark); }

    /* 패널 및 리스트 */
    .panel { display: none; }
    .panel.active { display: block; }
    .books-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
    
    .book-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--mint); display: flex; gap: 15px; position: relative; align-items: flex-start; }
    .book-cover-img { width: 65px; height: auto; border-radius: 4px; border: 1px solid #ddd; object-fit: cover; flex-shrink: 0; }
    .book-content { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
    .book-title { font-weight: bold; font-size: 16px; color: var(--forest-dark); }
    .book-info { font-size: 13px; color: #666; }
    .card-actions { display: flex; gap: 8px; margin-top: 5px; }
    
    .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
    .btn-primary { background: var(--forest-light); color: #fff; }
    .btn-secondary { background: var(--mint); color: var(--forest-dark); }
    .btn-danger { background: var(--soft-clay); color: #fff; }
    .btn-inline { padding: 8px 12px; margin-top: 6px; background: #eef3ed; color: var(--forest-dark); border: 1px solid var(--mint); width: auto; display: inline-block; text-align: center; border-radius: 6px; font-size: 13px; text-decoration: none; cursor: pointer; }

    /* 등록 폼 */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--forest-dark); }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--mint); border-radius: 8px; font-size: 14px; background: #fff; }
    textarea { height: 120px; resize: none; }
    input[type="file"] { padding: 6px; }

    /* AI 설정 상자 */
    .ai-key-box { background: #f4f7f4; border: 1px dashed var(--forest-light); padding: 10px; border-radius: 8px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }

    /* 모달 팝업 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-cream); border: 3px solid var(--forest-dark); padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mint); padding-bottom: 10px; margin-bottom: 15px; }
    .modal-title { font-weight: bold; color: var(--forest-dark); font-size: 18px; }
    .close-modal { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--soft-clay); }
    
    .modal-list-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--mint); margin-bottom: 10px; cursor: pointer; }
    .modal-list-item:hover { background: #fdfcf7; border-color: var(--forest-light); }
    
    .review-detail-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--mint); margin-top: 10px; }
    .review-section-title { font-weight: bold; color: var(--forest-light); margin-top: 10px; font-size: 14px; border-left: 3px solid var(--forest-light); padding-left: 6px; }

    .empty-text { text-align: center; color: #888; padding: 20px 0; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🌿 나의 힐링 독서 기록장</h1>
    <div class="stats-container">
      <div class="stat-card" onclick="openStatModal('total')">
        <h3>📚 총 완독</h3>
        <p id="stat-total">0권</p>
      </div>
      <div class="stat-card" onclick="openStatModal('month')">
        <h3>📅 이번 달</h3>
        <p id="stat-month">0권</p>
      </div>
      <div class="stat-card" onclick="openStatModal('quotes')">
        <h3>✨ 감명 깊은 말</h3>
        <p id="stat-quotes">0개</p>
      </div>
    </div>
    
    <div class="progress-area" onclick="openStatModal('graph')">
      <div id="progress-text" style="font-size: 13px; color: var(--forest-dark); display: flex; justify-content: space-between; align-items: center;">
        <span>📅 이번 달 독서 목표 (0/4권)</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div style="font-size: 11px; color: var(--forest-light); text-align: right; margin-top: 4px;">📊 터치하여 월별 독서 그래프 보기</div>
    </div>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('read')" id="tab-btn-read">📗 완독한 책</button>
    <button class="tab-btn" onclick="switchTab('reading')" id="tab-btn-reading">🌱 읽는 중</button>
    <button class="tab-btn" onclick="switchTab('wish')" id="tab-btn-wish">💚 읽고 싶은 책</button>
    <button class="tab-btn" onclick="switchTab('form')" id="tab-btn-form">✏️ 책 등록</button>
    <button class="tab-btn" onclick="switchTab('trash')" id="tab-btn-trash">🗑️ 휴지통</button>
  </div>

  <div class="panel active" id="panel-read"><div class="books-grid" id="grid-read"></div></div>
  <div class="panel" id="panel-reading"><div class="books-grid" id="grid-reading"></div></div>
  <div class="panel" id="panel-wish"><div class="books-grid" id="grid-wish"></div></div>
  <div class="panel" id="panel-trash"><div class="books-grid" id="grid-trash"></div></div>

  <div class="panel" id="panel-form">
    <form id="book-form" onsubmit="saveBook(event)">
      <input type="hidden" id="edit-id">
      <input type="hidden" id="form-cover-url">
      
      <div class="form-group">
        <label>독서 상태</label>
        <select id="form-status" onchange="toggleFormFields()">
          <option value="read">📗 완독한 책</option>
          <option value="reading">🌱 읽는 중인 책</option>
          <option value="wish">💚 읽고 싶은 책</option>
        </select>
      </div>
      <div class="form-group">
        <label>📖 책 제목</label>
        <input type="text" id="form-title" required>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <button type="button" class="btn-inline" onclick="searchBookCover()">🔍 구글에서 표지 검색</button>
        </div>
      </div>

      <div class="form-group">
        <label>🖼️ 책 표지 직접 업로드 (선택)</label>
        <input type="file" id="form-cover-file" accept="image/*" onchange="uploadBookCover(this)">
        <div id="cover-preview-container" style="display: none; margin-top: 10px; align-items: center; gap: 10px;">
          <img id="cover-preview" src="" alt="표지 미리보기" style="width: 80px; border-radius: 6px; border: 1px solid var(--mint);">
          <span style="font-size: 13px; color: var(--forest-light); font-weight: bold;">표지가 연동되었습니다! ✨</span>
        </div>
      </div>

      <div class="form-group">
        <label>✍️ 저자</label>
        <input type="text" id="form-author">
      </div>

      <div class="form-group id-start-date">
        <label>📅 독서 시작일</label>
        <input type="date" id="form-start-date">
      </div>

      <div class="form-group id-read-date">
        <label>📅 완독일</label>
        <input type="date" id="form-read-date">
      </div>

      <div class="form-group id-quote-field">
        <label>✨ 감명 깊었던 말</label>
        <input type="text" id="form-quote" placeholder="기억하고 싶은 문장을 적어보세요.">
      </div>
      
      <div class="form-group id-review-field">
        <label>📝 독후감 / 느낀 점</label>
        <textarea id="form-review" placeholder="자유롭게 기록을 남겨보세요."></textarea>
        
        <div class="ai-key-box">
          <label style="font-size: 12px; color: var(--forest-dark); margin: 0;">🔑 나만의 Gemini API Key 입력 (브라우저 내부에만 안전히 보관)</label>
          <input type="password" id="ai-api-key" placeholder="AIzaSy...로 시작하는 키를 붙여넣으세요" style="padding: 6px; font-size: 12px;">
          <button type="button" class="btn-inline" style="background:#eaf2f8; margin: 0; width: 100%; font-weight: bold;" onclick="generateAIReviewSummary()">🧠 진짜 AI로 3줄 요약하기</button>
        </div>
        
        <div id="ai-summary-container" style="display: none; margin-top: 10px; background: #fff; border: 2px dashed var(--mint); padding: 12px; border-radius: 8px;">
          <div style="font-weight: bold; color: var(--forest-dark); font-size: 13px; margin-bottom: 5px;">🤖 AI가 요약한 핵심 노트</div>
          <p id="ai-summary-text" style="font-size: 13px; color: #444; white-space: pre-line; line-height: 1.5;"></p>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; margin-top:10px;">💾 저장하기</button>
    </form>
  </div>
</div>

<div class="modal" id="stat-modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">목록 보기</div>
      <button class="close-modal" onclick="document.getElementById('stat-modal').classList.remove('active')">✕</button>
    </div>
    <div id="modal-body-content"></div>
  </div>
</div>

<script>
  let books = [];
  let trashBooks = []; // 🗑️ 휴지통에 들어간 책들을 임시 보관할 별도 배열

  function loadData() {
    const localData = localStorage.getItem('books');
    if (localData) {
      books = JSON.parse(localData);
      books.forEach(book => {
        if (!book.status) book.status = book.isWish ? 'wish' : 'read';
        if (!book.id) book.id = Date.now() + Math.random();
      });
    } else {
      books = [];
    }

    // 휴지통 데이터 로드
    const localTrash = localStorage.getItem('trashBooks');
    if (localTrash) {
      trashBooks = JSON.parse(localTrash);
    } else {
      trashBooks = [];
    }
    
    // ⏰ 사이트 접속 시 30일이 지난 휴지통 항목들 자동으로 영구 지우기 실행
    checkAndCleanTrash();

    const savedKey = localStorage.getItem('gemini_api_key');
    if(savedKey && document.getElementById('ai-api-key')) {
      document.getElementById('ai-api-key').value = savedKey;
    }
  }

  function saveData() {
    localStorage.setItem('books', JSON.stringify(books));
    localStorage.setItem('trashBooks', JSON.stringify(trashBooks));
    
    const keyInput = document.getElementById('ai-api-key').value.trim();
    if(keyInput) {
      localStorage.setItem('gemini_api_key', keyInput);
    }
    renderAll();
  }

  // 🕒 30일 만료 계산 및 자동 정리 로직
  function checkAndCleanTrash() {
    const now = Date.now();
    const thirtyDaysMs = 30 * 24 * 60 * 60 * 1000; // 30일을 밀리초로 변환
    
    // 삭제된 지 30일 이내인 책들만 필터링하여 남기기
    const updatedTrash = trashBooks.filter(book => {
      const deletedTime = new Date(book.deletedAt).getTime();
      return (now - deletedTime) < thirtyDaysMs;
    });

    if(updatedTrash.length !== trashBooks.length) {
      trashBooks = updatedTrash;
      localStorage.setItem('trashBooks', JSON.stringify(trashBooks));
    }
  }

  function switchTab(status) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(`panel-${status}`).classList.add('active');
    document.getElementById(`tab-btn-${status}`).classList.add('active');

    if(status === 'form' && !document.getElementById('edit-id').value) {
      document.getElementById('book-form').reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('form-cover-url').value = '';
      document.getElementById('cover-preview-container').style.display = 'none';
      document.getElementById('ai-summary-container').style.display = 'none';
      
      const savedKey = localStorage.getItem('gemini_api_key');
      if(savedKey) document.getElementById('ai-api-key').value = savedKey;
      
      toggleFormFields();
    }
  }

  function toggleFormFields() {
    const status = document.getElementById('form-status').value;
    document.querySelector('.id-start-date').style.display = (status === 'reading' || status === 'read') ? 'block' : 'none';
    document.querySelector('.id-read-date').style.display = status === 'read' ? 'block' : 'none';
    document.querySelector('.id-quote-field').style.display = status === 'read' ? 'block' : 'none';
    document.querySelector('.id-review-field').style.display = status === 'read' ? 'block' : 'none';
  }

  function searchBookCover() {
    const title = document.getElementById('form-title').value.trim();
    if(!title) {
      alert('책 제목을 먼저 입력해 주세요! 📖');
      return;
    }

    const previewContainer = document.getElementById('cover-preview-container');
    const previewImg = document.getElementById('cover-preview');
    const coverUrlInput = document.getElementById('form-cover-url');

    fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}`)
      .then(res => res.json())
      .then(data => {
        if(data.items && data.items.length > 0 && data.items[0].volumeInfo.imageLinks) {
          let thumb = data.items[0].volumeInfo.imageLinks.thumbnail;
          if (thumb.startsWith('http://')) {
            thumb = thumb.replace('http://', 'https://');
          }
          coverUrlInput.value = thumb;
          previewImg.src = thumb;
          previewContainer.style.display = 'flex';
        } else {
          alert('표지 이미지를 찾을 수 없습니다 😢 직접 업로드 기능을 이용해 보세요!');
          coverUrlInput.value = '';
          previewContainer.style.display = 'none';
        }
      })
      .catch(err => {
        alert('검색 중 오류가 발생했습니다. 다시 시도해 주세요.');
        console.error(err);
      });
  }

  function uploadBookCover(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('form-cover-url').value = e.target.result;
        document.getElementById('cover-preview').src = e.target.result;
        document.getElementById('cover-preview-container').style.display = 'flex';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  async function generateAIReviewSummary() {
    const apiKey = document.getElementById('ai-api-key').value.trim();
    const reviewText = document.getElementById('form-review').value.trim();
    const title = document.getElementById('form-title').value.trim();

    if(!apiKey) {
      alert('🔑 발급받으신 Gemini API Key를 입력창에 먼저 붙여넣어 주세요!');
      return;
    }
    if(!reviewText || reviewText.length < 10) {
      alert('📝 독후감을 최소 10자 이상 적어주셔야 분석이 가능합니다!');
      return;
    }

    const summaryContainer = document.getElementById('ai-summary-container');
    const summaryText = document.getElementById('ai-summary-text');
    
    summaryContainer.style.display = 'block';
    summaryText.innerText = '🤖 AI가 독후감을 분석하여 맞춤 요약 노트를 작성하고 있습니다...⏳';

    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `사용자가 작성한 도서 《${title}》의 독후감을 분석하여 핵심 내용을 친절하고 다정한 어조로 딱 3줄 요약해줘. 각 줄의 시작에는 번호(1., 2., 3.)를 붙이고 줄바꿈을 해줘. 다른 설명은 제외하고 딱 3줄 요약 결과만 보내줘.\n\n[사용자 독후감]:\n${reviewText}`
            }]
          }]
        })
      });

      if (!response.ok) throw new Error(`서버 응답 오류: ${response.status}`);

      const resData = await response.json();
      if(resData.candidates && resData.candidates[0].content.parts[0].text) {
        const aiResult = resData.candidates[0].content.parts[0].text.trim();
        summaryText.innerText = aiResult;
        localStorage.setItem('gemini_api_key', apiKey);
      } else {
        throw new Error('올바른 응답 형식이 아닙니다.');
      }
    } catch (err) {
      console.error(err);
      summaryText.innerText = `❌ 요약에 실패했습니다.\n사유: ${err.message}`;
    }
  }

  function renderAll() {
    loadData();
    
    const gridRead = document.getElementById('grid-read');
    const gridReading = document.getElementById('grid-reading');
    const gridWish = document.getElementById('grid-wish');
    const gridTrash = document.getElementById('grid-trash'); // 휴지통 그리드

    gridRead.innerHTML = '';
    gridReading.innerHTML = '';
    gridWish.innerHTML = '';
    gridTrash.innerHTML = '';

    let countRead = 0, countReading = 0, countWish = 0, countQuotes = 0;
    const thisMonth = new Date().toISOString().slice(0, 7);
    let countMonth = 0;

    // 1. 일반 도서 리스트 출력
    books.forEach(book => {
      const card = document.createElement('div');
      card.className = 'book-card';
      const coverSrc = book.coverUrl ? `<img class="book-cover-img" src="${book.coverUrl}" alt="표지">` : `<div class="book-cover-img" style="background:#eef3ed; display:flex; align-items:center; justify-content:center; font-size:24px;">📗</div>`;

      if (book.status === 'read') {
        countRead++;
        if (book.readDate && book.readDate.startsWith(thisMonth)) countMonth++;
        if (book.quote && book.quote.trim() !== '') countQuotes++;

        let periodInfo = book.startDate && book.readDate ? `<br>🌱 기간: ${book.startDate} ~ ${book.readDate}` : `<br>📅 완독일: ${book.readDate || '기록없음'}`;

        card.innerHTML = `
          ${coverSrc}
          <div class="book-content">
            <div class="book-title">${book.title}</div>
            <div class="book-info">✍️ ${book.author || '미상'}${periodInfo}</div>
            <div class="card-actions">
              <button class="btn btn-secondary" onclick="viewBookDetail('${book.id}')">📝 독후감 보기</button>
              <button class="btn btn-danger" onclick="moveToTrash('${book.id}')">지우기</button>
            </div>
          </div>
        `;
        gridRead.appendChild(card);

      } else if (book.status === 'reading') {
        countReading++;
        card.innerHTML = `
          ${coverSrc}
          <div class="book-content">
            <div class="book-title">${book.title}</div>
            <div class="book-info">✍️ ${book.author || '미상'} <br> 🌱 시작일: ${book.startDate || '기록없음'}</div>
            <div class="card-actions">
              <button class="btn btn-primary" onclick="moveToReadForm('${book.id}')">✅ 완독하기</button>
              <button class="btn btn-danger" onclick="moveToTrash('${book.id}')">지우기</button>
            </div>
          </div>
        `;
        gridReading.appendChild(card);

      } else if (book.status === 'wish') {
        countWish++;
        card.innerHTML = `
          ${coverSrc}
          <div class="book-content">
            <div class="book-title">${book.title}</div>
            <div class="book-info">✍️ ${book.author || '미상'}</div>
            <div class="card-actions">
              <button class="btn btn-primary" onclick="startReading('${book.id}')">🌱 읽기 시작</button>
              <button class="btn btn-danger" onclick="moveToTrash('${book.id}')">지우기</button>
            </div>
          </div>
        `;
        gridWish.appendChild(card);
      }
    });

    // 2. 🗑️ 휴지통 리스트 렌더링 영역
    if(trashBooks.length === 0) {
      gridTrash.innerHTML = '<p class="empty-text">휴지통이 비어 있습니다. 🍃</p>';
    } else {
      trashBooks.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        const coverSrc = book.coverUrl ? `<img class="book-cover-img" src="${book.coverUrl}" alt="표지">` : `<div class="book-cover-img" style="background:#f2eef0; display:flex; align-items:center; justify-content:center; font-size:24px;">🗑️</div>`;
        
        // 보관 남은 일수 계산
        const deletedTime = new Date(book.deletedAt).getTime();
        const daysLeft = 30 - Math.floor((Date.now() - deletedTime) / (1000 * 60 * 60 * 24));

        card.innerHTML = `
          ${coverSrc}
          <div class="book-content">
            <div class="book-title" style="color: #888; text-decoration: line-through;">${book.title}</div>
            <div class="book-info" style="color: var(--soft-clay); font-weight: bold;">⚠️ ${daysLeft}일 후 영구 자동 삭제됨</div>
            <div class="card-actions">
              <button class="btn btn-primary" onclick="restoreBook('${book.id}')" style="background: var(--forest-light);">↩️ 복구하기</button>
              <button class="btn btn-danger" onclick="permanentlyDeleteBook('${book.id}')">즉시 영구삭제</button>
            </div>
          </div>
        `;
        gridTrash.appendChild(card);
      });
    }

    // 상단 네비게이션 권수 동기화
    document.getElementById('tab-btn-read').innerHTML = `📗 완독한 책 <span style="font-size:11px; opacity:0.8;">(${countRead})</span>`;
    document.getElementById('tab-btn-reading').innerHTML = `🌱 읽는 중 <span style="font-size:11px; opacity:0.8;">(${countReading})</span>`;
    document.getElementById('tab-btn-wish').innerHTML = `💚 읽고 싶은 책 <span style="font-size:11px; opacity:0.8;">(${countWish})</span>`;
    document.getElementById('tab-btn-trash').innerHTML = `🗑️ 휴지통 <span style="font-size:11px; opacity:0.8; color: var(--soft-clay);">(${trashBooks.length})</span>`;

    document.getElementById('stat-total').innerText = `${countRead}권`;
    document.getElementById('stat-month').innerText = `${countMonth}권`;
    document.getElementById('stat-quotes').innerText = `${countQuotes}개`;

    const monthlyGoal = parseInt(localStorage.getItem('monthlyGoal')) || 4;
    const progressPercent = Math.min((countMonth / monthlyGoal) * 100, 100);
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    document.getElementById('progress-text').innerHTML = `
      <span>📅 이번 달 독서 목표 (${countMonth}/${monthlyGoal}권)</span>
      <span onclick="changeGoal(event)" style="font-size:11px; color:var(--forest-light); text-decoration:underline; cursor:pointer;">[목표 변경]</span>
    `;
  }

  // 🗑️ 지우기를 눌렀을 때 휴지통으로 날짜와 함께 이동하는 로직
  function moveToTrash(id) {
    if(confirm('이 도서를 휴지통으로 보낼까요? 30일 동안 보관됩니다. 🌿')) {
      const targetIndex = books.findIndex(b => b.id == id);
      if(targetIndex > -1) {
        const deletedBook = books.splice(targetIndex, 1)[0];
        deletedBook.deletedAt = new Date().toISOString(); // 삭제일 태깅
        trashBooks.push(deletedBook);
        saveData();
      }
    }
  }

  // ↩️ 휴지통에서 다시 내 독서록으로 완벽하게 복구하는 함수
  function restoreBook(id) {
    const targetIndex = trashBooks.findIndex(b => b.id == id);
    if(targetIndex > -1) {
      const restoredBook = trashBooks.splice(targetIndex, 1)[0];
      delete restoredBook.deletedAt; // 삭제 시간 정보 초기화 제거
      books.push(restoredBook);
      saveData();
      alert('독서 리스트로 안전하게 복구되었습니다! ✨');
    }
  }

  // 🔥 휴지통에서 원할 때 완전히 영구히 제거하는 함수
  function permanentlyDeleteBook(id) {
    if(confirm('이 기록은 되돌릴 수 없습니다. 완전히 영구 삭제할까요? ⚠️')) {
      trashBooks = trashBooks.filter(b => b.id != id);
      saveData();
    }
  }

  function changeGoal(e) {
    e.stopPropagation();
    const currentGoal = localStorage.getItem('monthlyGoal') || 4;
    const newGoal = prompt('새로운 한 달 독서 목표 권수를 입력해주세요:', currentGoal);
    if(newGoal && !isNaN(newGoal) && parseInt(newGoal) > 0) {
      localStorage.setItem('monthlyGoal', parseInt(newGoal));
      renderAll();
    }
  }

  function editBook(id) {
    const book = books.find(b => b.id == id);
    if(!book) return;

    document.getElementById('stat-modal').classList.remove('active');
    switchTab('form');
    
    document.getElementById('edit-id').value = book.id;
    document.getElementById('form-status').value = book.status;
    document.getElementById('form-title').value = book.title;
    document.getElementById('form-author').value = book.author || '';
    document.getElementById('form-start-date').value = book.startDate || '';
    document.getElementById('form-read-date').value = book.readDate || '';
    document.getElementById('form-quote').value = book.quote || '';
    document.getElementById('form-review').value = book.review || '';
    document.getElementById('form-cover-url').value = book.coverUrl || '';

    if(book.coverUrl) {
      document.getElementById('cover-preview').src = book.coverUrl;
      document.getElementById('cover-preview-container').style.display = 'flex';
    } else {
      document.getElementById('cover-preview-container').style.display = 'none';
    }

    if(book.aiSummary) {
      document.getElementById('ai-summary-text').innerText = book.aiSummary;
      document.getElementById('ai-summary-container').style.display = 'block';
    } else {
      document.getElementById('ai-summary-container').style.display = 'none';
    }

    toggleFormFields();
  }

  function startReading(id) {
    const book = books.find(b => b.id == id);
    if(book) {
      switchTab('form');
      document.getElementById('form-status').value = 'reading';
      document.getElementById('edit-id').value = book.id;
      document.getElementById('form-title').value = book.title;
      document.getElementById('form-author').value = book.author || '';
      document.getElementById('form-cover-url').value = book.coverUrl || '';
      if(book.coverUrl) {
        document.getElementById('cover-preview').src = book.coverUrl;
        document.getElementById('cover-preview-container').style.display = 'flex';
      }
      document.getElementById('form-start-date').value = new Date().toISOString().slice(0, 10);
      toggleFormFields();
    }
  }

  function moveToReadForm(id) {
    const book = books.find(b => b.id == id);
    if(book) {
      switchTab('form');
      document.getElementById('form-status').value = 'read';
      document.getElementById('edit-id').value = book.id;
      document.getElementById('form-title').value = book.title;
      document.getElementById('form-author').value = book.author || '';
      document.getElementById('form-cover-url').value = book.coverUrl || '';
      if(book.coverUrl) {
        document.getElementById('cover-preview').src = book.coverUrl;
        document.getElementById('cover-preview-container').style.display = 'flex';
      }
      document.getElementById('form-read-date').value = new Date().toISOString().slice(0, 10);
      toggleFormFields();
    }
  }

  function saveBook(e) {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const status = document.getElementById('form-status').value;
    const title = document.getElementById('form-title').value;
    const author = document.getElementById('form-author').value;
    const startDate = document.getElementById('form-start-date').value;
    const readDate = document.getElementById('form-read-date').value;
    const quote = document.getElementById('form-quote').value;
    const review = document.getElementById('form-review').value;
    const coverUrl = document.getElementById('form-cover-url').value;
    
    const aiContainer = document.getElementById('ai-summary-container');
    const aiSummary = aiContainer.style.display === 'block' ? document.getElementById('ai-summary-text').innerText : '';

    if(id) {
      const book = books.find(b => b.id == id);
      if(book) {
        book.status = status;
        book.title = title;
        book.author = author;
        book.startDate = startDate;
        if(status === 'read') book.readDate = readDate;
        book.quote = quote;
        book.review = review;
        book.coverUrl = coverUrl;
        if(aiSummary && !aiSummary.startsWith('🤖 AI가') && !aiSummary.startsWith('❌ 요약에')) book.aiSummary = aiSummary;
      }
    } else {
      const newBook = {
        id: Date.now() + Math.random(),
        status: status,
        title: title,
        author: author,
        startDate: startDate,
        readDate: status === 'read' ? readDate : '',
        quote: status === 'read' ? quote : '',
        review: status === 'read' ? review : '',
        coverUrl: coverUrl,
        aiSummary: (aiSummary && !aiSummary.startsWith('🤖 AI가') && !aiSummary.startsWith('❌ 요약에')) ? aiSummary : ''
      };
      books.push(newBook);
    }
    
    document.getElementById('edit-id').value = '';
    saveData();
    switchTab(status);
  }

  function openStatModal(type) {
    const modal = document.getElementById('stat-modal');
    const title = document.getElementById('modal-title');
    const body = document.getElementById('modal-body-content');
    body.innerHTML = '';
    
    modal.classList.add('active');

    if(type === 'total') {
      title.innerText = '📗 나의 전체 완독 리스트';
      const readBooks = books.filter(b => b.status === 'read');
      if(readBooks.length === 0) {
        body.innerHTML = '<p class="empty-text">아직 완독한 책이 없어요 🌳</p>';
      } else {
        readBooks.forEach(b => {
          body.innerHTML += `
            <div class="modal-list-item" onclick="viewBookDetail('${b.id}')" style="display:flex; gap:10px; align-items:center;">
              ${b.coverUrl ? `<img src="${b.coverUrl}" style="width:35px; height:auto; border-radius:3px;">` : `<span style="font-size:20px;">📗</span>`}
              <div>
                <strong>${b.title}</strong> <span style="font-size:12px; color:#666;">(${b.author || '미상'})</span>
                <div style="font-size:11px; color:var(--forest-light); margin-top:2px;">📅 완독일: ${b.readDate || '-'}</div>
              </div>
            </div>`;
        });
      }
    } else if (type === 'month') {
      title.innerText = '📅 이번 달 완독 리스트';
      const thisMonth = new Date().toISOString().slice(0, 7);
      const monthBooks = books.filter(b => b.status === 'read' && b.readDate && b.readDate.startsWith(thisMonth));
      if(monthBooks.length === 0) {
        body.innerHTML = '<p class="empty-text">이번 달에 완독한 책이 아직 없어요 🌱</p>';
      } else {
        monthBooks.forEach(b => {
          body.innerHTML += `
            <div class="modal-list-item" onclick="viewBookDetail('${b.id}')" style="display:flex; gap:10px; align-items:center;">
              ${b.coverUrl ? `<img src="${b.coverUrl}" style="width:35px; height:auto; border-radius:3px;">` : `<span style="font-size:20px;">📗</span>`}
              <div>
                <strong>${b.title}</strong>
                <div style="font-size:11px; color:var(--forest-light); margin-top:2px;">📅 완독일: ${b.readDate}</div>
              </div>
            </div>`;
        });
      }
    } else if (type === 'quotes') {
      title.innerText = '✨ 내가 수집한 감명 깊은 말';
      const quoteBooks = books.filter(b => b.status === 'read' && b.quote && b.quote.trim() !== '');
      if(quoteBooks.length === 0) {
        body.innerHTML = '<p class="empty-text">아직 수집된 따뜻한 한 줄 문장이 없어요 💫</p>';
      } else {
        quoteBooks.forEach(b => {
          body.innerHTML += `
            <div class="modal-list-item" onclick="viewBookDetail('${b.id}')">
              <div style="font-style:italic; color:var(--text-dark); font-weight:500;">" ${b.quote} "</div>
              <div style="font-size:11px; text-align:right; color:var(--forest-light); margin-top:6px;">— 《 ${b.title} 》</div>
            </div>`;
        });
      }
    } else if (type === 'graph') {
      title.innerText = '📊 월별 완독 독서량 그래프';
      
      const monthlyCounts = {};
      books.forEach(b => {
        if(b.status === 'read' && b.readDate) {
          const monthStr = b.readDate.slice(0, 7);
          monthlyCounts[monthStr] = (monthlyCounts[monthStr] || 0) + 1;
        }
      });

      const months = Object.keys(monthlyCounts).sort();
      if(months.length === 0) {
        body.innerHTML = '<p class="empty-text">기록된 완독 데이터가 부족하여 그래프를 그릴 수 없어요 🌿</p>';
      } else {
        let graphHtml = '<div style="display:flex; align-items:flex-end; justify-content:space-around; height:200px; padding:20px 10px; background:#fff; border-radius:10px; border:1px solid var(--mint); margin-bottom:15px;">';
        const maxCount = Math.max(...Object.values(monthlyCounts));
        
        months.forEach(m => {
          const count = monthlyCounts[m];
          const barHeight = (count / maxCount) * 130;
          const displayMonth = m.split('-')[1] + '월';
          
          graphHtml += `
            <div style="display:flex; flex-direction:column; align-items:center; flex-grow:1;">
              <span style="font-size:11px; font-weight:bold; color:var(--forest-dark); margin-bottom:4px;">${count}권</span>
              <div style="width:25px; height:${barHeight}px; background:var(--forest-light); border-radius:4px 4px 0 0; transition:height 0.3s;"></div>
              <span style="font-size:11px; color:#666; margin-top:6px; white-space:nowrap;">${displayMonth}</span>
            </div>
          `;
        });
        graphHtml += '</div>';
        body.innerHTML = graphHtml;
      }
    }
  }

  function viewBookDetail(id) {
    const book = books.find(b => b.id == id);
    if(!book) return;

    const modal = document.getElementById('stat-modal');
    const title = document.getElementById('modal-title');
    const body = document.getElementById('modal-body-content');
    
    modal.classList.add('active');
    title.innerText = '📖 나의 독서 기록장 상세';

    let dateText = `📅 완독일: ${book.readDate || '-'}`;
    if(book.startDate && book.readDate) {
      dateText = `📅 기간: ${book.startDate} ~ ${book.readDate}`;
    }

    body.innerHTML = `
      <div style="display:flex; gap:15px; margin-bottom:15px; align-items:center; background:#fff; padding:12px; border-radius:10px; border:1px solid var(--mint);">
        ${book.coverUrl ? `<img src="${book.coverUrl}" style="width:60px; border-radius:4px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">` : `<div style="font-size:35px;">📗</div>`}
        <div style="flex-grow: 1;">
          <h2 style="color:var(--forest-dark); font-size:16px; margin-bottom:4px;">${book.title}</h2>
          <p style="font-size:13px; color:#666;">✍️ 저자: ${book.author || '미상'}</p>
          <p style="font-size:12px; color:var(--forest-light);">${dateText}</p>
        </div>
        <button class="btn btn-primary" onclick="editBook('${book.id}')" style="background:var(--forest-dark); padding: 8px 10px;">✏️ 수정</button>
      </div>
      <div class="review-detail-box">
        <div class="review-section-title">✨ 감명 깊었던 말</div>
        <p style="font-size:14px; margin-top:5px; font-style:italic; background:#fbf9f1; padding:8px; border-radius:6px; color:#444;">
          ${book.quote ? `"${book.quote}"` : '등록된 한 줄 평이 없습니다.'}
        </p>
        
        ${book.aiSummary ? `
        <div class="review-section-title">🤖 AI 3줄 요약 노트</div>
        <p style="font-size:13px; margin-top:5px; background:#eaf2f8; padding:10px; border-radius:6px; color:#333; line-height:1.5; white-space:pre-line;">
          ${book.aiSummary}
        </p>` : ''}

        <div class="review-section-title">📝 내가 적은 독후감</div>
        <p style="font-size:14px; margin-top:5px; white-space:pre-wrap; line-height:1.6; color:#222;">${book.review || '작성된 내용이 없습니다.'}</p>
      </div>
      <button class="btn btn-secondary" style="width:100%; margin-top:15px;" onclick="renderAll(); document.getElementById('stat-modal').classList.remove('active');">닫기</button>
    `;
  }

  function closeModal(e) {
    if(e.target === document.getElementById('stat-modal')) {
      document.getElementById('stat-modal').classList.remove('active');
    }
  }

  window.onload = function() {
    renderAll();
  };
</script>
</body>
</html>
