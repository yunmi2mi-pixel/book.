<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>힐링 독서 기록장 🌿</title>
  <style>
    :root {
      --bg-cream: #fbf9f1;
      --forest-dark: #2c4a3e;
      --forest-light: #4a7c59;
      --mint: #a3b899;
      --soft-clay: #e07a5f;
      --text-dark: #2b2d42;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: var(--bg-cream); color: var(--text-dark); padding: 20px; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; }

    /* 헤더 및 통계 */
    header { text-align: center; margin-bottom: 30px; padding: 20px; background: #fff; border-radius: 15px; border: 2px solid var(--mint); }
    h1 { color: var(--forest-dark); margin-bottom: 15px; font-size: 24px; }
    
    .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .stat-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--mint); text-align: center; cursor: pointer; transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-3px); background-color: #f4f7f4; }
    .stat-card h3 { font-size: 13px; color: var(--forest-light); }
    .stat-card p { font-size: 20px; font-weight: bold; color: var(--forest-dark); }

    /* 새싹 게이지 */
    .progress-area { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--mint); margin-bottom: 25px; }
    .progress-bar { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 8px; }
    .progress-fill { background: var(--forest-light); height: 100%; width: 0%; transition: width 0.5s; }

    /* 탭 메뉴 */
    .tab-nav { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn { background: #fff; border: 1px solid var(--mint); padding: 10px 15px; border-radius: 20px; cursor: pointer; color: var(--forest-light); font-weight: bold; white-space: nowrap; }
    .tab-btn.active { background: var(--forest-dark); color: #fff; border-color: var(--forest-dark); }

    /* 패널 및 리스트 */
    .panel { display: none; }
    .panel.active { display: block; }
    .books-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
    
    .book-card { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--mint); display: flex; flex-direction: column; gap: 10px; position: relative; }
    .book-title { font-weight: bold; font-size: 16px; color: var(--forest-dark); }
    .book-info { font-size: 13px; color: #666; }
    .card-actions { display: flex; gap: 8px; margin-top: 5px; }
    
    .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
    .btn-primary { background: var(--forest-light); color: #fff; }
    .btn-secondary { background: var(--mint); color: var(--forest-dark); }
    .btn-danger { background: var(--soft-clay); color: #fff; }

    /* 등록 폼 */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--forest-dark); }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--mint); border-radius: 8px; font-size: 14px; background: #fff; }
    textarea { height: 120px; resize: none; }

    /* 아늑한 크림색 모달 팝업 🌿 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-cream); border: 3px solid var(--forest-dark); padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--mint); padding-bottom: 10px; margin-bottom: 15px; }
    .modal-title { font-weight: bold; color: var(--forest-dark); font-size: 18px; }
    .close-modal { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--soft-clay); }
    
    .modal-list-item { background: #fff; padding: 12px; border-radius: 8px; border: 1px solid var(--mint); margin-bottom: 10px; cursor: pointer; }
    .modal-list-item:hover { background: #fdfcf7; border-color: var(--forest-light); }
    
    .review-detail-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--mint); margin-top: 10px; }
    .review-section-title { font-weight: bold; color: var(--forest-light); margin-top: 10px; font-size: 14px; border-left: 3px solid var(--forest-light); padding-left: 6px; }

    .empty-text { text-align: center; color: #888; padding: 20px 0; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>🌿 나의 힐링 독서 기록장</h1>
    <div class="stats-container">
      <div class="stat-card" onclick="openStatModal('total')">
        <h3>📚 총 완독</h3>
        <p id="stat-total">0권</p>
      </div>
      <div class="stat-card" onclick="openStatModal('month')">
        <h3>📅 이번 달</h3>
        <p id="stat-month">0권</p>
      </div>
      <div class="stat-card" onclick="openStatModal('quotes')">
        <h3>✨ 감명 깊은 말</h3>
        <p id="stat-quotes">0개</p>
      </div>
    </div>
    <div class="progress-area">
      <div id="progress-text" style="font-size: 13px; color: var(--forest-dark);">🌱 독서 나무 가꾸기 (0/10)</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('read')" id="tab-btn-read">📗 완독한 책</button>
    <button class="tab-btn" onclick="switchTab('reading')" id="tab-btn-reading">🌱 읽는 중</button>
    <button class="tab-btn" onclick="switchTab('wish')" id="tab-btn-wish">💚 읽고 싶은 책</button>
    <button class="tab-btn" onclick="switchTab('form')" id="tab-btn-form">✏️ 책 등록</button>
  </div>

  <div class="panel active" id="panel-read">
    <div class="books-grid" id="grid-read"></div>
  </div>

  <div class="panel" id="panel-reading">
    <div class="books-grid" id="grid-reading"></div>
  </div>

  <div class="panel" id="panel-wish">
    <div class="books-grid" id="grid-wish"></div>
  </div>

  <div class="panel" id="panel-form">
    <form id="book-form" onsubmit="saveBook(event)">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>독서 상태</label>
        <select id="form-status" onchange="toggleFormFields()">
          <option value="read">📗 완독한 책</option>
          <option value="reading">🌱 읽는 중인 책</option>
          <option value="wish">💚 읽고 싶은 책</option>
        </select>
      </div>
      <div class="form-group">
        <label>📖 책 제목</label>
        <input type="text" id="form-title" required>
      </div>
      <div class="form-group">
        <label>✍️ 저자</label>
        <input type="text" id="form-author">
      </div>
      <div class="form-group id-read-date">
        <label>📅 완독일</label>
        <input type="date" id="form-read-date">
      </div>
      <div class="form-group id-quote-field">
        <label>✨ 감명 깊었던 말</label>
        <input type="text" id="form-quote" placeholder="기억하고 싶은 문장을 적어보세요.">
      </div>
      <div class="form-group id-review-field">
        <label>📝 독후감 / 느낀 점</label>
        <textarea id="form-review" placeholder="자유롭게 기록을 남겨보세요."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:12px;">💾 저장하기</button>
    </form>
  </div>
</div>

<div class="modal" id="stat-modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">목록 보기</div>
      <button class="close-modal" onclick="document.getElementById('stat-modal').classList.remove('active')">✕</button>
    </div>
    <div id="modal-body-content"></div>
  </div>
</div>

<script>
  let books = [];

  // 데이터 안전 로드 및 마이그레이션 예외처리
  function loadData() {
    const localData = localStorage.getItem('books');
    if (localData) {
      books = JSON.parse(localData);
      
      books.forEach(book => {
        if (!book.status) {
          if (book.isWish) {
            book.status = 'wish';
          } else {
            book.status = 'read';
          }
        }
        if (!book.id) book.id = Date.now() + Math.random();
      });
    } else {
      books = [];
    }
  }

  function saveData() {
    localStorage.setItem('books', JSON.stringify(books));
    renderAll();
  }

  function switchTab(status) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(`panel-${status}`).classList.add('active');
    document.getElementById(`tab-btn-${status}`).classList.add('active');

    if(status === 'form') {
      document.getElementById('book-form').reset();
      document.getElementById('edit-id').value = '';
      toggleFormFields();
    }
  }

  function toggleFormFields() {
    const status = document.getElementById('form-status').value;
    document.querySelector('.id-read-date').style.display = status === 'read' ? 'block' : 'none';
    document.querySelector('.id-quote-field').style.display = status === 'read' ? 'block' : 'none';
    document.querySelector('.id-review-field').style.display = status === 'read' ? 'block' : 'none';
  }

  function renderAll() {
    loadData();
    
    const gridRead = document.getElementById('grid-read');
    const gridReading = document.getElementById('grid-reading');
    const gridWish = document.getElementById('grid-wish');

    gridRead.innerHTML = '';
    gridReading.innerHTML = '';
    gridWish.innerHTML = '';

    let countRead = 0, countReading = 0, countWish = 0, countQuotes = 0;
    const thisMonth = new Date().toISOString().slice(0, 7);
    let countMonth = 0;

    books.forEach(book => {
      const card = document.createElement('div');
      card.className = 'book-card';

      if (book.status === 'read') {
        countRead++;
        if (book.readDate && book.readDate.startsWith(thisMonth)) countMonth++;
        if (book.quote && book.quote.trim() !== '') countQuotes++;

        card.innerHTML = `
          <div class="book-title">${book.title}</div>
          <div class="book-info">✍️ ${book.author || '미상'} | 📅 완독: ${book.readDate || '기록없음'}</div>
          <div class="card-actions">
            <button class="btn btn-secondary" onclick="viewBookDetail('${book.id}')">📝 독후감 보기</button>
            <button class="btn btn-danger" onclick="deleteBook('${book.id}')">지우기</button>
          </div>
        `;
        gridRead.appendChild(card);

      } else if (book.status === 'reading') {
        countReading++;
        card.innerHTML = `
          <div class="book-title">${book.title}</div>
          <div class="book-info">✍️ ${book.author || '미상'} <br> 🌱 시작일: ${book.startDate || '기록없음'}</div>
          <div class="card-actions">
            <button class="btn btn-primary" onclick="moveToReadForm('${book.id}')">✅ 완독하기</button>
            <button class="btn btn-danger" onclick="deleteBook('${book.id}')">지우기</button>
          </div>
        `;
        gridReading.appendChild(card);

      } else if (book.status === 'wish') {
        countWish++;
        card.innerHTML = `
          <div class="book-title">${book.title}</div>
          <div class="book-info">✍️ ${book.author || '미상'}</div>
          <div class="card-actions">
            <button class="btn btn-primary" onclick="startReading('${book.id}')">🌱 읽기 시작</button>
            <button class="btn btn-danger" onclick="deleteBook('${book.id}')">지우기</button>
          </div>
        `;
        gridWish.appendChild(card);
      }
    });

    document.getElementById('tab-btn-read').innerHTML = `📗 완독한 책 <span style="font-size:11px; opacity:0.8;">(${countRead})</span>`;
    document.getElementById('tab-btn-reading').innerHTML = `🌱 읽는 중 <span style="font-size:11px; opacity:0.8;">(${countReading})</span>`;
    document.getElementById('tab-btn-wish').innerHTML = `💚 읽고 싶은 책 <span style="font-size:11px; opacity:0.8;">(${countWish})</span>`;

    document.getElementById('stat-total').innerText = `${countRead}권`;
    document.getElementById('stat-month').innerText = `${countMonth}권`;
    document.getElementById('stat-quotes').innerText = `${countQuotes}개`;

    const progressPercent = Math.min((countRead / 10) * 100, 100);
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    document.getElementById('progress-text').innerText = progressPercent >= 100 ? '🌳 축하합니다! 울창한 독서 나무 완성!' : `🌱 독서 나무 가꾸기 (${countRead}/10)`;
  }

  function startReading(id) {
    const book = books.find(b => b.id == id);
    if(book) {
      book.status = 'reading';
      book.startDate = new Date().toISOString().slice(0, 10);
      saveData();
    }
  }

  function moveToReadForm(id) {
    const book = books.find(b => b.id == id);
    if(book) {
      switchTab('form');
      document.getElementById('form-status').value = 'read';
      document.getElementById('edit-id').value = book.id;
      document.getElementById('form-title').value = book.title;
      document.getElementById('form-author').value = book.author || '';
      document.getElementById('form-read-date').value = new Date().toISOString().slice(0, 10);
      toggleFormFields();
    }
  }

  function saveBook(e) {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const status = document.getElementById('form-status').value;
    const title = document.getElementById('form-title').value;
    const author = document.getElementById('form-author').value;
    const readDate = document.getElementById('form-read-date').value;
    const quote = document.getElementById('form-quote').value;
    const review = document.getElementById('form-review').value;

    if(id) {
      const book = books.find(b => b.id == id);
      if(book) {
        book.status = status;
        book.title = title;
        book.author = author;
        book.readDate = readDate;
        book.quote = quote;
        book.review = review;
      }
    } else {
      const newBook = {
        id: Date.now() + Math.random(),
        status: status,
        title: title,
        author: author,
        readDate: status === 'read' ? readDate : '',
        startDate: status === 'reading' ? new Date().toISOString().slice(0, 10) : '',
        quote: status === 'read' ? quote : '',
        review: status === 'read' ? review : ''
      };
      books.push(newBook);
    }
    saveData();
    switchTab(status);
  }

  function deleteBook(id) {
    if(confirm('이 기록을 정말 지우시겠어요? 🌿')) {
      books = books.filter(b => b.id != id);
      saveData();
    }
  }

  function openStatModal(type) {
    const modal = document.getElementById('stat-modal');
    const title = document.getElementById('modal-title');
    const body = document.getElementById('modal-body-content');
    body.innerHTML = '';
    
    modal.classList.add('active');

    if(type === 'total') {
      title.innerText = '📗 나의 전체 완독 리스트';
      const readBooks = books.filter(b => b.status === 'read');
      if(readBooks.length === 0) {
        body.innerHTML = '<p class="empty-text">아직 완독한 책이 없어요 🌳</p>';
      } else {
        readBooks.forEach(b => {
          body.innerHTML += `
            <div class="modal-list-item" onclick="viewBookDetail('${b.id}')">
              <strong>${b.title}</strong> <span style="font-size:12px; color:#666;">(${b.author || '미상'})</span>
              <div style="font-size:11px; color:var(--forest-light); margin-top:4px;">📅 완독일: ${b.readDate || '-'}</div>
            </div>`;
        });
      }
    } else if (type === 'month') {
      title.innerText = '📅 이번 달 완독 리스트';
      const thisMonth = new Date().toISOString().slice(0, 7);
      const monthBooks = books.filter(b => b.status === 'read' && b.readDate && b.readDate.startsWith(thisMonth));
      if(monthBooks.length === 0) {
        body.innerHTML = '<p class="empty-text">이번 달에 완독한 책이 아직 없어요 🌱</p>';
      } else {
        monthBooks.forEach(b => {
          body.innerHTML += `
            <div class="modal-list-item" onclick="viewBookDetail('${b.id}')">
              <strong>${b.title}</strong>
              <div style="font-size:11px; color:var(--forest-light); margin-top:4px;">📅 완독일: ${b.readDate}</div>
            </div>`;
        });
      }
    } else if (type === 'quotes') {
      title.innerText = '✨ 내가 수집한 감명 깊은 말';
      const quoteBooks = books.filter(b => b.status === 'read' && b.quote && b.quote.trim() !== '');
      if(quoteBooks.length === 0) {
        body.innerHTML = '<p class="empty-text">아직 수집된 따뜻한 한 줄 문장이 없어요 💫</p>';
      } else {
        quoteBooks.forEach(b => {
          body.innerHTML += `
            <div class="modal-list-item" onclick="viewBookDetail('${b.id}')">
              <div style="font-style:italic; color:var(--text-dark); font-weight:500;">" ${b.quote} "</div>
              <div style="font-size:11px; text-align:right; color:var(--forest-light); margin-top:6px;">— 《 ${b.title} 》</div>
            </div>`;
        });
      }
    }
  }

  function viewBookDetail(id) {
    const book = books.find(b => b.id == id);
    if(!book) return;

    const modal = document.getElementById('stat-modal');
    const title = document.getElementById('modal-title');
    const body = document.getElementById('modal-body-content');
    
    modal.classList.add('active');
    title.innerText = '📖 나의 독서 기록장 상세';

    body.innerHTML = `
      <div style="text-align:center; margin-bottom:15px;">
        <h2 style="color:var(--forest-dark); font-size:18px;">${book.title}</h2>
        <p style="font-size:13px; color:#666;">✍️ 저자: ${book.author || '미상'} | 📅 완독일: ${book.readDate || '-'}</p>
      </div>
      <div class="review-detail-box">
        <div class="review-section-title">✨ 감명 깊었던 말</div>
        <p style="font-size:14px; margin-top:5px; font-style:italic; background:#fbf9f1; padding:8px; border-radius:6px; color:#444;">
          ${book.quote ? `"${book.quote}"` : '등록된 한 줄 평이 없습니다.'}
        </p>
        
        <div class="review-section-title">📝 내가 적은 독후감</div>
        <p style="font-size:14px; margin-top:5px; white-space:pre-wrap; line-height:1.6;">${book.review || '작성된 내용이 없습니다.'}</p>
      </div>
      <button class="btn btn-secondary" style="width:100%; margin-top:15px;" onclick="renderAll(); document.getElementById('stat-modal').classList.remove('active');">닫기</button>
    `;
  }

  function closeModal(e) {
    if(e.target === document.getElementById('stat-modal')) {
      document.getElementById('stat-modal').classList.remove('active');
    }
  }

  window.onload = function() {
    renderAll();
  };
</script>
</body>
</html>
